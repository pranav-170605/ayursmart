services:

  db:
    image: mysql:8.0
    container_name: ayursmart_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ayursmart123
      MYSQL_DATABASE: ayursmart
      MYSQL_USER: ayuruser
      MYSQL_PASSWORD: ayursmart123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - ayursmart_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-payursmart123"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  backend:
    build:
      context: ./backend1
      dockerfile: Dockerfile
    container_name: ayursmart_backend
    restart: unless-stopped
    env_file:
      - ./backend1/.env
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      DB_USER: ayuruser
      DB_PASSWORD: ayursmart123
      DB_NAME: ayursmart
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ayursmart_net

volumes:
  mysql_data:

networks:
  ayursmart_net:
    driver: bridge
