name: AyurSmart CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install flake8
          pip install -r backend1/requirements.txt

      - name: Lint with flake8
        run: |
          flake8 backend1/app.py --max-line-length=120 --ignore=E501,W503

      - name: Build Docker image
        run: |
          docker build -t ayursmart-backend ./backend1
